services:
  nats:
    image: nats:latest
    command: ["--js", "-m", "8222"]
    ports:
      - "4222:4222"

  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8080:8080"
    volumes:
      - sqld_data:/var/lib/sqld
    environment:
      SQLD_NODE: primary

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - nats
      - sqld

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "4000:80"

  # landing service removed — "marketing site/" has no Dockerfile yet

volumes:
  sqld_data:
